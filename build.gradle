buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.1.0'
    }
}
allprojects {
    repositories {
        google()
        mavenCentral()
        // 追加 Xposed 专属 API 仓库与 jcenter 归档作为后备
        maven { url 'https://api.xposed.info/' }
        jcenter()
    }
}
